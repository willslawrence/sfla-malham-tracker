<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>THC SFLA Combined Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff4100;
      --primary-dark: #ff6a00;
      --suitable: #22c55e;
      --suitable-stale: #eab308;
      --suitable-old: #f97316;
      --unsuitable: #6b7280;
      --pending: #ef4444;
      --route: #e879f9;
      --bg-dark: #05053f;
      --bg-card: rgba(5,5,63,0.85);
      --text: #f0f0f0;
      --text-muted: rgba(255,255,255,0.45);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Barlow Condensed', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
    }
    #map { height: 100vh; width: 100%; }
    
    .leaflet-popup { display: none !important; }
    
    /* Area filter panel */
    #area-panel {
      position: fixed;
      top: 16px;
      left: 16px;
      background: var(--bg-card);
      border-radius: 20px;
      padding: 14px 16px 16px;
      z-index: 1001;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      border: 1.5px solid rgba(255,255,255,0.06);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      min-width: 170px;
    }
    #area-panel h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .area-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .area-toggle input { display: none; }
    .area-check {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 2px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      transition: all 0.15s;
    }
    .area-toggle.active .area-check {
      border-color: var(--primary);
      background: var(--primary);
    }
    .area-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-riyadh { background: #3b82f6; }
    .dot-malham { background: #22c55e; }
    .dot-nadj { background: #a855f7; }
    .dot-routes { background: var(--route); }
    
    #route-banner {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(232, 121, 249,0.15);
      border: 1.5px solid rgba(232, 121, 249,0.4);
      border-radius: 20px;
      padding: 8px 16px;
      z-index: 1001;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--route);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: none;
    }
    #route-banner.active { display: block; }
    
    /* Top info panel */
    #info-panel {
      position: fixed;
      top: 16px;
      left: 200px;
      background: var(--bg-card);
      border-radius: 28px;
      padding: 16px 18px 20px;
      max-width: 220px;
      z-index: 1001;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      border: 1.5px solid rgba(255,255,255,0.06);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      display: none;
      overflow: hidden;
    }
    #info-panel::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,65,0,0.25), transparent);
    }
    #info-panel.active { display: block; }
    #info-panel .panel-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    #info-panel .panel-status {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    #info-panel .panel-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }
    #info-panel .panel-area {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text);
      margin-top: 4px;
      font-weight: 500;
    }
    #info-panel .panel-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
    }
    #info-panel textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      resize: none;
      height: 40px;
      margin-top: 8px;
    }
    #info-panel textarea:focus { outline: none; border-color: var(--primary); }
    #info-panel textarea::placeholder { color: var(--text-muted); }
    
    /* Radial action buttons */
    #radial-menu {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1000;
      display: none;
    }
    #radial-menu.active { display: block; }
    
    .radial-btn {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4), 0 0 20px rgba(255,65,0,0.1);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .radial-btn:active { transform: scale(0.9); }
    .radial-btn.btn-suitable { background: var(--suitable); color: white; }
    .radial-btn.btn-unsuitable { background: var(--unsuitable); color: white; }
    .radial-btn.btn-close { background: rgba(255,255,255,0.9); color: #333; width: 36px; height: 36px; font-size: 16px; }
    
    .radial-line {
      position: absolute;
      background: rgba(255,255,255,0.4);
      height: 2px;
      transform-origin: left center;
      pointer-events: none;
    }
    
    /* Popup */
    .popup-name { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 12px; color: var(--primary); text-transform: uppercase; letter-spacing: 0.06em; }
    .popup-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-muted); }
    .popup-info span:last-child { color: var(--text); font-weight: 500; }
    .popup-status { display: inline-block; padding: 4px 14px; border-radius: 18px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
    .status-suitable { background: var(--suitable); color: white; }
    .status-suitable-stale { background: var(--suitable-stale); color: white; }
    .status-suitable-old { background: var(--suitable-old); color: white; }
    .status-unsuitable { background: var(--unsuitable); color: white; }
    .status-pending { background: var(--pending); color: white; }
    .popup-notes { margin: 14px 0; }
    .popup-notes textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 12px; color: var(--text); font-size: 14px; font-family: 'JetBrains Mono', monospace; resize: none; min-height: 60px; }
    .popup-notes textarea:focus { outline: none; border-color: var(--primary); }
    .popup-notes textarea::placeholder { color: var(--text-muted); }
    .popup-buttons { display: flex; gap: 12px; margin-top: 16px; }
    .popup-btn { flex: 1; padding: 14px 10px; border: none; border-radius: 18px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
    .popup-btn:active { transform: scale(0.97); }
    .popup-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-suitable { background: var(--suitable); color: white; }
    .btn-unsuitable { background: var(--unsuitable); color: white; }
    
    /* Controls */
    .controls {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .control-btn {
      width: 44px;
      height: 44px;
      background: var(--bg-card);
      border: 1.5px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.15s, background 0.15s;
    }
    .control-btn:hover { background: rgba(255,65,0,0.15); box-shadow: 0 4px 15px rgba(0,0,0,0.3), 0 0 16px rgba(255,65,0,0.2); }
    .control-btn.active { background: linear-gradient(135deg, #ff4100, #ff6a00); }
    
    /* Legend */
    .map-legend {
      position: absolute;
      bottom: 30px;
      left: 10px;
      z-index: 1000;
      background: rgba(5,5,63,0.75);
      border: 1.5px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 8px 12px;
      font-size: 9px;
      color: rgba(200,200,200,0.8);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }
    .map-legend h4 { margin: 0 0 4px; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255,255,255,0.8); }
    .map-legend .legend-row { display: flex; align-items: center; gap: 5px; margin: 2px 0; }
    .map-legend .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    
    /* Shape labels — pointer-events:none so clicks pass through to polygon below */
    .shape-label { background: transparent; border: none; color: white; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; text-shadow: 0 1px 3px rgba(0,0,0,0.8), 0 0 2px rgba(0,0,0,0.9); white-space: nowrap; pointer-events: none; }
    
    /* Route labels — no background, pill inherits route color via inline style */
    .route-label { background: transparent; border-radius: 10px; color: white; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 8px; white-space: nowrap; pointer-events: none; }
    
    /* Location dot */
    .my-location { width: 16px; height: 16px; background: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(59,130,246,0.5); }
    .my-location.following { animation: pulse-loc 1.5s ease-in-out infinite; }
    @keyframes pulse-loc { 0%, 100% { box-shadow: 0 0 10px rgba(59,130,246,0.5); } 50% { box-shadow: 0 0 20px rgba(59,130,246,0.8), 0 0 40px rgba(59,130,246,0.3); } }
    .accuracy-circle { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); border-radius: 50%; }
    .leaflet-control-zoom { display: none; }
    .gps-label { background: rgba(0,0,0,0.7) !important; border: 1px solid #00ffff !important; color: #00ffff !important; font-size: 11px !important; font-weight: bold !important; padding: 2px 6px !important; border-radius: 3px !important; }
  </style>
</head>
<body>
  <div id="map"></div>
  
  <!-- Area filter panel -->
  <div id="area-panel">
    <h3>SFLA Areas</h3>
    <label class="area-toggle active" data-area="Riyadh UAM">
      <input type="checkbox" id="chk-riyadh" checked>
      <span class="area-check">✓</span>
      <span class="area-dot dot-riyadh"></span>
      Riyadh UAM
    </label>
    <label class="area-toggle active" data-area="Malham">
      <input type="checkbox" id="chk-malham" checked>
      <span class="area-check">✓</span>
      <span class="area-dot dot-malham"></span>
      Malham / KAFD
    </label>
    <label class="area-toggle active" data-area="NAJD">
      <input type="checkbox" id="chk-nadj" checked>
      <span class="area-check">✓</span>
      <span class="area-dot dot-nadj"></span>
      NAJD / Diriyah
    </label>
    <h3 style="margin-top:12px;">Routes</h3>
    <label class="area-toggle active" data-area="routes">
      <input type="checkbox" id="chk-routes" checked>
      <span class="area-check">✓</span>
      <span class="area-dot dot-routes"></span>
      UVR Routes
    </label>
  </div>
  
  <!-- Route banner -->
  <div id="route-banner">🛤️ UVR Routes Active</div>
  
  <!-- Legend -->
  <div class="map-legend">
    <h4>SFLA Status</h4>
    <div class="legend-row"><span class="dot" style="background:#4caf50"></span> Current</div>
    <div class="legend-row"><span class="dot" style="background:#ffeb3b"></span> Review</div>
    <div class="legend-row"><span class="dot" style="background:#ff9800"></span> Review Overdue</div>
    <div class="legend-row"><span class="dot" style="background:#f44336"></span> New SFLA</div>
  </div>
  
  <div class="controls">
    <button class="control-btn" id="btnLocation" title="My Location">📍</button>
    <button class="control-btn" id="btnSatellite" title="Satellite View">🛰️</button>
    <button class="control-btn" id="btnZoomIn" title="Zoom In">+</button>
    <button class="control-btn" id="btnZoomOut" title="Zoom Out">−</button>
  </div>
  
  <!-- Top info panel -->
  <div id="info-panel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-name" id="panelName"></div>
    <div class="panel-status" id="panelStatus"></div>
    <div class="panel-area" id="panelArea"></div>
    <div class="panel-date" id="panelDate"></div>
    <textarea id="panelNotes" placeholder="Notes..."></textarea>
  </div>

  <!-- Radial action buttons -->
  <div id="radial-menu">
    <div class="radial-line" id="lineSuitable"></div>
    <div class="radial-line" id="lineUnsuitable"></div>
    <button class="radial-btn btn-suitable" id="radialSuitable">✓</button>
    <button class="radial-btn btn-unsuitable" id="radialUnsuitable">✗</button>
    <button class="radial-btn btn-close" id="radialClose">✕</button>
  </div>
  
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="shapes.js"></script>
  <script src="routes.js"></script>
  <script>
    // Config
    const AIRTABLE_BASE = 'appBJW3FvPw5c659F';
    const AIRTABLE_TABLE = 'Malham%20Sites';
    const AIRTABLE_CHANGELOG = 'Malham%20Change%20Log';
    const API_KEY = atob('cGF0TGJPcnd3cmptZTV2TjMuYWUxNjNlYmE5YjZkMzgyNzc0MjEzMTJmZGM1MzFhYjQ3M2U2MWQ4NDFlN2RlZGUzYmY1OTJiNDc1YThjMGE1NA==');
    
    // DOM element refs — must be declared before any function that uses them
    const infoPanel = document.getElementById('info-panel');
    const radialMenu = document.getElementById('radial-menu');
    const radialSuitable = document.getElementById('radialSuitable');
    const radialUnsuitable = document.getElementById('radialUnsuitable');
    const radialClose = document.getElementById('radialClose');
    const lineSuitable = document.getElementById('lineSuitable');
    const lineUnsuitable = document.getElementById('lineUnsuitable');
    
    // Colors
    const COLORS = {
      suitable: '#22c55e',
      suitableStale: '#eab308',
      suitableOld: '#f97316',
      unsuitable: '#6b7280',
      pending: '#ef4444',
      route: '#e879f9'
    };
    
    // Area colors for routes
    const AREA_COLORS = {
      'Riyadh UAM': '#3b82f6',
      'Malham': '#22c55e',
      'NAJD': '#a855f7'
    };
    
    function daysSince(dateStr) {
      if (!dateStr) return Infinity;
      return Math.floor((new Date() - new Date(dateStr)) / (1000 * 60 * 60 * 24));
    }
    
    function getShapeColor(status, lastChecked) {
      if (status === 'Unsuitable') return COLORS.unsuitable;
      if (status === 'Pending' || status === 'New SFLA' || !status || status === 'Unknown') return COLORS.pending;
      if (status === 'Suitable') {
        const d = daysSince(lastChecked);
        if (d >= 28) return COLORS.suitableOld;
        if (d >= 21) return COLORS.suitableStale;
        return COLORS.suitable;
      }
      return COLORS.pending;
    }
    
    function getStatusClass(status, lastChecked) {
      if (status === 'Unsuitable') return 'status-unsuitable';
      if (status === 'Pending' || status === 'New SFLA' || !status || status === 'Unknown') return 'status-pending';
      if (status === 'Suitable') {
        const d = daysSince(lastChecked);
        if (d >= 28) return 'status-suitable-old';
        if (d >= 21) return 'status-suitable-stale';
        return 'status-suitable';
      }
      return 'status-pending';
    }
    
    function getDisplayStatus(status, lastChecked) {
      if (status === 'Unsuitable') return 'Unsuitable';
      if (status === 'Pending' || !status || status === 'Unknown') return 'Pending Review';
      if (status === 'Suitable') {
        const d = daysSince(lastChecked);
        if (d >= 28) return 'Suitable (4+ wks)';
        if (d >= 21) return 'Suitable (3+ wks)';
        return 'Suitable';
      }
      return 'Pending Review';
    }
    
    // Map layers
    const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '©OpenStreetMap, ©CARTO' });
    const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '©Esri' });
    
    const map = L.map('map', {
      center: [24.87, 46.62],
      zoom: 11,
      layers: [darkLayer],
      zoomControl: false,
      tap: true,
      tapTolerance: 20
    });
    
    let isSatellite = false;
    let polygons = {};
    let labels = {};
    let siteData = {};
    let locationMarker = null;
    let selectedShape = null;
    let selectedPoly = null;
    let routeLines = [];
    let activeAreas = { 'Riyadh UAM': true, 'Malham': true, 'NAJD': true, 'routes': true };
    let shapeLayerGroup = L.layerGroup().addTo(map);
    let routeLayerGroup = L.layerGroup().addTo(map);
    
    // Area filter toggle
    document.querySelectorAll('.area-toggle').forEach(toggle => {
      toggle.addEventListener('click', (e) => {
        e.preventDefault(); // Prevent browser's automatic checkbox toggle
        const area = toggle.dataset.area;
        const checkbox = toggle.querySelector('input');
        const checked = !checkbox.checked; // Invert since we prevented default
        
        toggle.classList.toggle('active', checked);
        checkbox.checked = checked;
        activeAreas[area] = checked;
        
        if (area === 'routes') {
          if (checked) {
            routeLayerGroup.eachLayer(l => routeLayerGroup.addLayer(l));
          } else {
            routeLayerGroup.eachLayer(l => routeLayerGroup.removeLayer(l));
          }
          document.getElementById('route-banner').classList.toggle('active', checked && routeLines.length > 0);
        } else {
          shapeLayerGroup.eachLayer(l => {
            if (l instanceof L.Polygon) {
              const shape = polyShapeMap.get(l);
              if (shape && shape.source === area) {
                checked ? shapeLayerGroup.addLayer(l) : shapeLayerGroup.removeLayer(l);
              }
            }
          });
        }
      });
    });
    
    // Satellite toggle
    document.getElementById('btnSatellite').addEventListener('click', function() {
      isSatellite = !isSatellite;
      this.classList.toggle('active', isSatellite);
      if (isSatellite) { map.removeLayer(darkLayer); map.addLayer(satelliteLayer); }
      else { map.removeLayer(satelliteLayer); map.addLayer(darkLayer); }
    });
    
    document.getElementById('btnZoomIn').addEventListener('click', () => map.zoomIn());
    document.getElementById('btnZoomOut').addEventListener('click', () => map.zoomOut());
    
    // Location tracking
    let watchId = null, isFollowing = false, accuracyCircle = null;
    const btnLocation = document.getElementById('btnLocation');
    
    function startFollowing() {
      isFollowing = true;
      btnLocation.classList.add('active');
      if (locationMarker) locationMarker.getElement()?.classList.add('following');
    }
    function stopFollowing() {
      isFollowing = false;
      btnLocation.classList.remove('active');
      if (locationMarker) locationMarker.getElement()?.classList.remove('following');
    }
    function updateLocation(pos) {
      const latlng = [pos.coords.latitude, pos.coords.longitude];
      if (locationMarker) locationMarker.setLatLng(latlng);
      else {
        locationMarker = L.marker(latlng, { icon: L.divIcon({ className: 'my-location following', iconSize: [16, 16] }) }).addTo(map);
      }
      if (accuracyCircle) accuracyCircle.setLatLng(latlng).setRadius(pos.coords.accuracy);
      else {
        accuracyCircle = L.circle(latlng, { radius: pos.coords.accuracy, className: 'accuracy-circle', stroke: true, color: 'rgba(59,130,246,0.3)', fillColor: 'rgba(59,130,246,0.08)', weight: 1 }).addTo(map);
      }
      if (isFollowing) map.setView(latlng, Math.max(map.getZoom(), 14), { animate: true });
    }
    function stopTracking() {
      if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
      stopFollowing();
      if (locationMarker) { map.removeLayer(locationMarker); locationMarker = null; }
      if (accuracyCircle) { map.removeLayer(accuracyCircle); accuracyCircle = null; }
    }
    
    btnLocation.addEventListener('click', function() {
      if (watchId !== null && isFollowing) { stopFollowing(); this.textContent = '📌'; return; }
      if (watchId !== null && !isFollowing) { stopTracking(); return; }
      this.textContent = '⏳';
      startFollowing();
      watchId = navigator.geolocation.watchPosition(updateLocation, (err) => { alert('Could not get location'); stopTracking(); }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 });
    });
    
    map.on('dragstart touchmove', () => { if (isFollowing) stopFollowing(); });
    
    function formatArea(m2) {
      if (m2 >= 10000) return (m2 / 10000).toFixed(1) + ' ha';
      return m2.toLocaleString() + ' m²';
    }
    
    // Convert #RRGGBBAA (Python-converted KML AABBGGRR) to CSS rgba(R,G,B,A)
    function kmlColorToRgba(hexColor) {
      if (!hexColor || hexColor.length !== 9) return 'rgba(232,121,249,1)';
      const red   = parseInt(hexColor.slice(1, 3), 16);
      const green = parseInt(hexColor.slice(3, 5), 16);
      const blue  = parseInt(hexColor.slice(5, 7), 16);
      const alpha = parseInt(hexColor.slice(7, 9), 16) / 255;
      return `rgba(${red},${green},${blue},${alpha.toFixed(2)})`;
    }
    
    // Render routes
    function renderRoutes() {
      if (typeof ROUTES === 'undefined') return;
      routeLines = [];
      ROUTES.forEach((route, i) => {
        const approved = route.approved;
        const lineColor = approved ? kmlColorToRgba(route.color) : 'rgba(255,255,255,0.7)';
        const dash = route.dashArray || (approved ? null : '5,5');

        const line = L.polyline(route.coords, {
          color: lineColor,
          weight: approved ? 4 : 3,
          dashArray: dash,
          opacity: approved ? 0.9 : 0.7
        }).addTo(routeLayerGroup);
        
        // Short name label at midpoint — estimate size based on name length
        const shortName = route.name.replace(/:.*$/, '').trim();
        const rgbaColor = kmlColorToRgba(route.color);
        const labelHtml = `<div class="route-label" style="background:${rgbaColor}">${shortName}${approved ? '' : ' ✗'}</div>`;
        const textLen = shortName.length * 7 + 24;
        const lastCoord = route.coords[route.coords.length - 1];
        L.marker(lastCoord, {
          icon: L.divIcon({ html: labelHtml, iconSize: [Math.min(textLen, 160), 22], iconAnchor: [Math.min(textLen/2, 80), 11] }),
          interactive: false
        }).addTo(routeLayerGroup);
        
        // Popup with full details
        line.bindPopup(`<div class="popup-name">${route.name}</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${approved ? '#22c55e' : '#ef4444'};margin-bottom:8px;">${approved ? '✓ APPROVED' : '✗ NOT APPROVED'}</div><div style="font-size:12px;color:#aaa;">Solid = Approved · Dashed = Not Approved</div>`);
        routeLines.push(line);
      });
      document.getElementById('route-banner').classList.add('active');
    }
    
    // Render GPS points
    function renderGPSPoints() {
      if (typeof GPS_POINTS === 'undefined') return;
      GPS_POINTS.forEach(pt => {
        const marker = L.circleMarker([pt.lat, pt.lng], { radius: 6, fillColor: '#00ffff', color: '#fff', weight: 2, fillOpacity: 0.9 }).addTo(map);
        marker.bindTooltip(pt.name, { permanent: true, direction: 'right', offset: [8, 0], className: 'gps-label' });
      });
    }
    
    // Load site data from Airtable
    async function loadSiteData() {
      try {
        let allRecords = [], offset = null;
        do {
          const url = `https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_TABLE}?pageSize=100${offset ? '&offset=' + offset : ''}`;
          const resp = await fetch(url, { headers: { 'Authorization': `Bearer ${API_KEY}` } });
          const data = await resp.json();
          allRecords = allRecords.concat(data.records || []);
          offset = data.offset;
        } while (offset);
        allRecords.forEach(r => { siteData[r.fields['SFLA Name'] || r.fields.Name] = r; });
        renderRoutes();
        renderGPSPoints();
        renderShapes();
      } catch (err) { console.error('Failed to load:', err); renderRoutes(); renderGPSPoints(); renderShapes(); }
    }
    
    // Render shapes
    function renderShapes() {
      SHAPES.forEach(shape => {
        const site = siteData[shape.name];
        const status = site?.fields?.Status || 'Pending';
        const lastChecked = site?.fields?.LastChecked;
        const color = getShapeColor(status, lastChecked);
        
        // Use a WeakMap to associate polygons with their shapes (Leaflet strips unknown options)
        const polyShapeMap = new WeakMap();
        
        const poly = L.polygon(shape.coords, {
          color: color, fillColor: color, fillOpacity: 0.4, weight: 5
        });
        poly._shapeName = shape.name;
        polyShapeMap.set(poly, shape);
        if (activeAreas[shape.source]) shapeLayerGroup.addLayer(poly);
        
        poly.on('click', (e) => { L.DomEvent.stopPropagation(e); showRadialMenu(shape, poly, e.latlng); });
        polygons[shape.name] = poly;
        
        const label = L.marker(shape.center, {
          icon: L.divIcon({ className: 'shape-label', html: shape.name, iconSize: null })
        });
        if (activeAreas[shape.source]) shapeLayerGroup.addLayer(label);
        labels[shape.name] = label;
      });
    }
    
    function updateShapeColor(name, status, lastChecked) {
      const poly = polygons[name];
      if (poly) poly.setStyle({ color: getShapeColor(status, lastChecked), fillColor: getShapeColor(status, lastChecked) });
    }
    
    function drawLine(lineEl, x1, y1, x2, y2) {
      const dx = x2-x1, dy = y2-y1, length = Math.sqrt(dx*dx+dy*dy), angle = Math.atan2(dy,dx)*180/Math.PI;
      lineEl.style.left = x1+'px'; lineEl.style.top = y1+'px'; lineEl.style.width = length+'px'; lineEl.style.transform = `rotate(${angle}deg)`;
    }
    
    function showRadialMenu(shape, poly, latlng) {
      if (selectedPoly) {
        const prevSite = siteData[selectedShape?.name];
        const prevStatus = prevSite?.fields?.Status || 'Pending';
        const prevLastChecked = prevSite?.fields?.LastChecked;
        selectedPoly.setStyle({ weight: 5 });
      }
      selectedShape = shape; selectedPoly = poly;
      poly.setStyle({ weight: 7 }); poly.bringToFront();
      
      const site = siteData[shape.name];
      const status = site?.fields?.Status || 'Pending';
      const lastChecked = site?.fields?.LastChecked;
      const lastCheckedDisplay = lastChecked ? new Date(lastChecked).toLocaleDateString('en-GB') : 'Never';
      const notes = site?.fields?.Notes || '';
      
      document.getElementById('panelName').textContent = shape.name + ' [' + shape.source + ']';
      document.getElementById('panelStatus').textContent = getDisplayStatus(status, lastChecked);
      document.getElementById('panelArea').textContent = shape.area_m2 ? formatArea(shape.area_m2) : '';
      document.getElementById('panelDate').textContent = `Last: ${lastCheckedDisplay}`;
      document.getElementById('panelNotes').value = notes;
      infoPanel.classList.add('active');
      
      const point = map.latLngToContainerPoint(latlng);
      const cx = point.x, cy = point.y, radius = 65;
      const angle1 = -Math.PI*3/4, x1=cx+Math.cos(angle1)*radius-24, y1=cy+Math.sin(angle1)*radius-24;
      const angle2 = -Math.PI/4, x2=cx+Math.cos(angle2)*radius-24, y2=cy+Math.sin(angle2)*radius-24;
      radialSuitable.style.left=x1+'px'; radialSuitable.style.top=y1+'px';
      radialUnsuitable.style.left=x2+'px'; radialUnsuitable.style.top=y2+'px';
      radialClose.style.left=(cx-18)+'px'; radialClose.style.top=(cy+radius-18)+'px';
      drawLine(lineSuitable, cx, cy, x1+24, y1+24);
      drawLine(lineUnsuitable, cx, cy, x2+24, y2+24);
      radialMenu.classList.add('active');
    }
    
    function closePanel() {
      infoPanel.classList.remove('active');
      radialMenu.classList.remove('active');
      if (selectedPoly) selectedPoly.setStyle({ weight: 5 });
      selectedShape = null; selectedPoly = null;
    }
    
    // Map click fallback: if click reaches map (not intercepted by polygon), close panel
    map.on('click', (e) => {
      // Check if a shape was clicked by testing if click hit a polygon layer
      let hitLayer = null;
      map.eachLayer(layer => {
        if (layer instanceof L.Polygon && layer.options.fillOpacity !== undefined) {
          if (layer.getBounds().contains(e.latlng)) {
            hitLayer = layer;
          }
        }
      });
      // If no polygon was hit, close the panel (click was on empty map area)
      if (!hitLayer) {
        closePanel();
      }
    });
    
    radialSuitable.addEventListener('click', () => { if (selectedShape) saveStatus('Suitable'); });
    radialUnsuitable.addEventListener('click', () => { if (selectedShape) saveStatus('Unsuitable'); });
    radialClose.addEventListener('click', closePanel);
    
    map.on('move', () => {
      if (selectedShape && radialMenu.classList.contains('active')) {
        const latlng = selectedShape.center;
        const point = map.latLngToContainerPoint(latlng);
        const cx = point.x, cy = point.y, radius = 65;
        const angle1 = -Math.PI*3/4, x1=cx+Math.cos(angle1)*radius-24, y1=cy+Math.sin(angle1)*radius-24;
        const angle2 = -Math.PI/4, x2=cx+Math.cos(angle2)*radius-24, y2=cy+Math.sin(angle2)*radius-24;
        radialSuitable.style.left=x1+'px'; radialSuitable.style.top=y1+'px';
        radialUnsuitable.style.left=x2+'px'; radialUnsuitable.style.top=y2+'px';
        radialClose.style.left=(cx-18)+'px'; radialClose.style.top=(cy+radius-18)+'px';
        drawLine(lineSuitable, cx, cy, cx+Math.cos(angle1)*radius, cy+Math.sin(angle1)*radius);
        drawLine(lineUnsuitable, cx, cy, cx+Math.cos(angle2)*radius, cy+Math.sin(angle2)*radius);
      }
    });
    
    async function logChange(siteName, previousStatus, newStatus, notes) {
      try {
        await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_CHANGELOG}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields: { Name: siteName, Timestamp: new Date().toISOString(), PreviousStatus: previousStatus || 'Pending', NewStatus: newStatus, Notes: notes || '' } })
        });
      } catch (err) { console.warn('Change log failed:', err); }
    }
    
    async function saveStatus(status) {
      if (!selectedShape) return;
      const name = selectedShape.name, site = siteData[name], recordId = site?.id, previousStatus = site?.fields?.Status || 'Pending', notes = document.getElementById('panelNotes').value || '';
      radialSuitable.disabled = true; radialUnsuitable.disabled = true;
      const today = new Date().toISOString().split('T')[0];
      try {
        const resp = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_TABLE}/${recordId}`, {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields: { Status: status, Notes: notes, LastChecked: today } })
        });
        if (!resp.ok) throw new Error('Save failed');
        const updated = await resp.json();
        siteData[name] = updated;
        updateShapeColor(name, status, today);
        if (previousStatus !== status) logChange(name, previousStatus, status, notes);
        closePanel();
      } catch (err) { console.error('Save error:', err); alert('Failed to save. Try again.'); }
      finally { radialSuitable.disabled = false; radialUnsuitable.disabled = false; }
    }
    
    loadSiteData();
  </script>
</body>
</html>
